<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Market Intelligence Terminal</title>
<style>
:root {
  --bg:#0a0c0f; --bar:#0f1318; --border:#1e2d40; --bright:#2a3f58;
  --orange:#ff6b00; --blue:#00a8ff; --green:#00e676; --yellow:#ffd600; --red:#ff3d3d;
  --text:#e8f0f8; --dim:#7a9ab8; --mono:'Courier New','Lucida Console',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--mono);}

#topbar{
  position:fixed;top:0;left:0;right:0;height:52px;
  background:var(--bar);border-bottom:2px solid var(--orange);
  box-shadow:0 2px 24px rgba(255,107,0,.18);
  display:flex;align-items:center;gap:14px;padding:0 20px;z-index:1000;
}
.logo{color:var(--orange);font-size:12px;font-weight:bold;letter-spacing:3px;white-space:nowrap;}
.bar-div{width:1px;height:24px;background:var(--bright);flex-shrink:0;}
.nav-btn{
  background:transparent;border:1px solid transparent;color:var(--dim);
  font-family:var(--mono);font-size:10px;letter-spacing:2px;padding:5px 14px;
  cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;
  transition:all .2s;white-space:nowrap;
}
.nav-btn:hover{border-color:var(--bright);color:var(--text);}
.nav-btn.active{color:var(--orange);border-color:rgba(255,107,0,.4);}
#regimeBadge{
  font-size:10px;font-weight:bold;letter-spacing:2px;padding:3px 12px;
  border:1px solid currentColor;white-space:nowrap;flex-shrink:0;
  transition:color .3s;color:var(--dim);
}
.sp{flex:1;}
.select-wrap{position:relative;flex-shrink:0;}
#dateSelect{
  background:#131820;border:1px solid var(--bright);color:var(--text);
  font-family:var(--mono);font-size:12px;letter-spacing:1px;
  padding:6px 32px 6px 12px;appearance:none;cursor:pointer;outline:none;
  min-width:220px;transition:border-color .2s,box-shadow .2s;
}
#dateSelect:hover,#dateSelect:focus{
  border-color:var(--orange);box-shadow:0 0 0 1px rgba(255,107,0,.25);
}
.sel-arrow{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  color:var(--orange);pointer-events:none;font-size:10px;
}
#clock{color:var(--dim);font-size:11px;letter-spacing:1px;white-space:nowrap;flex-shrink:0;}
.status-dot{
  width:8px;height:8px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite;flex-shrink:0;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

#reportFrame{
  position:fixed;top:52px;left:0;right:0;bottom:0;
  width:100%;height:calc(100vh - 52px);border:none;background:var(--bg);
  transition:opacity .2s;
}
#overlay{
  position:fixed;top:52px;left:0;right:0;bottom:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;z-index:500;
}
.ov-ascii{color:var(--orange);font-size:11px;opacity:.45;letter-spacing:2px;white-space:pre;line-height:1.5;}
.ov-msg{color:var(--dim);font-size:12px;letter-spacing:2px;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.blink{animation:blink 1s step-end infinite;}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">▸ AI INTEL</div>
  <div class="bar-div"></div>
  <div class="status-dot"></div>
  <a class="nav-btn active" href="index.html">◈ REPORTS</a>
  <a class="nav-btn" href="journal.html">◈ JOURNAL</a>
  <div id="regimeBadge">---</div>
  <div class="sp"></div>
  <div class="select-wrap">
    <select id="dateSelect" onchange="onSelChange()"><option>載入中...</option></select>
    <span class="sel-arrow">▾</span>
  </div>
  <div class="bar-div"></div>
  <div id="clock">--:--:--</div>
</div>

<div id="overlay">
  <pre class="ov-ascii">╔══════════════════════════════════╗
║  AI MARKET INTELLIGENCE SYSTEM  ║
╚══════════════════════════════════╝</pre>
  <div class="ov-msg"><span class="blink">■</span> &nbsp;LOADING LATEST REPORT...</div>
</div>

<iframe id="reportFrame" src="about:blank"></iframe>

<script>
(function(){
  const p=n=>String(n).padStart(2,'0');
  const el=document.getElementById('clock');
  function u(){const n=new Date();el.textContent=`${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;}
  u();setInterval(u,1000);
})();

function applyRegime(regime){
  const el=document.getElementById('regimeBadge');
  el.textContent=regime||'---';
  const r=(regime||'').toLowerCase();
  el.style.color=r.includes('risk-on')?'var(--green)':r.includes('risk-off')?'var(--red)':'var(--yellow)';
}

let manifest=null;

async function init(){
  try{
    const res=await fetch('manifest.json?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    manifest=await res.json();
    const dates=manifest.dates||[];
    const sel=document.getElementById('dateSelect');
    sel.innerHTML='';
    dates.forEach(entry=>{
      const opt=document.createElement('option');
      opt.value=entry.date;
      opt.textContent=`${entry.display}  [${entry.regime}]`;
      sel.appendChild(opt);
    });
    if(manifest.latest) sel.value=manifest.latest;
    const latest=dates.find(d=>d.date===manifest.latest)||dates[0];
    if(latest) applyRegime(latest.regime);
    loadReport();
  }catch(e){
    document.getElementById('overlay').innerHTML=`
      <div style="color:var(--red);font-size:12px;letter-spacing:2px;text-align:center;line-height:2.5;">
        ✕ 無法載入 manifest.json<br>
        <span style="color:var(--dim);font-size:10px;">請確認 docs/manifest.json 存在且格式正確</span>
      </div>`;
  }
}

// 選日期直接換頁，不需要按按鈕
function onSelChange(){
  if(!manifest) return;
  const date=document.getElementById('dateSelect').value;
  const entry=manifest.dates.find(d=>d.date===date);
  if(entry) applyRegime(entry.regime);
  loadReport(); // 直接載入
}

function loadReport(){
  const date=document.getElementById('dateSelect').value;
  if(!date||date==='載入中...') return;
  const frame=document.getElementById('reportFrame');
  const overlay=document.getElementById('overlay');
  overlay.style.display='flex';
  frame.style.opacity='0';
  frame.onload=()=>{
    if(frame.src&&frame.src!=='about:blank'){
      overlay.style.display='none';
      frame.style.opacity='1';
    }
  };
  frame.src=date+'_claude.html';
}

init();
</script>
</body>
</html>
