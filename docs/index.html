<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Market Intelligence Terminal</title>
<style>
  :root {
    --bg: #0a0c0f;
    --bar-bg: #0f1318;
    --border: #1e2d40;
    --border-bright: #2a3f58;
    --orange: #ff6b00;
    --blue: #00a8ff;
    --green: #00e676;
    --yellow: #ffd600;
    --red: #ff3d3d;
    --text: #e8f0f8;
    --dim: #7a9ab8;
    --mono: 'Courier New', 'Lucida Console', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--mono);
  }

  /* ── Frozen top bar ─────────────────────────────── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: var(--bar-bg);
    border-bottom: 2px solid var(--orange);
    box-shadow: 0 2px 24px rgba(255,107,0,0.18);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    z-index: 1000;
  }

  .logo {
    color: var(--orange);
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .bar-divider {
    width: 1px;
    height: 24px;
    background: var(--border-bright);
    flex-shrink: 0;
  }

  #regimeBadge {
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 2px;
    padding: 3px 12px;
    border: 1px solid currentColor;
    white-space: nowrap;
    flex-shrink: 0;
    transition: color 0.3s;
    color: var(--dim);
  }

  .flex-space { flex: 1; }

  .select-wrap {
    position: relative;
    flex-shrink: 0;
  }

  #dateSelect {
    background: #131820;
    border: 1px solid var(--border-bright);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 1px;
    padding: 6px 32px 6px 12px;
    appearance: none;
    cursor: pointer;
    outline: none;
    min-width: 210px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #dateSelect:hover, #dateSelect:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 1px rgba(255,107,0,0.25);
  }

  .select-arrow {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--orange);
    pointer-events: none;
    font-size: 10px;
  }

  #loadBtn {
    background: transparent;
    border: 1px solid var(--orange);
    color: var(--orange);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    padding: 6px 20px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.2s, box-shadow 0.2s;
  }

  #loadBtn:hover {
    background: rgba(255,107,0,0.12);
    box-shadow: 0 0 16px rgba(255,107,0,0.25);
  }

  #loadBtn:active { transform: scale(0.97); }

  #clock {
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 1px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  /* ── iframe fills all space below bar ───────────── */
  #reportFrame {
    position: fixed;
    top: 52px;
    left: 0; right: 0; bottom: 0;
    width: 100%;
    height: calc(100vh - 52px);
    border: none;
    background: var(--bg);
    transition: opacity 0.25s;
  }

  /* ── Loading / error overlay ────────────────────── */
  #overlay {
    position: fixed;
    top: 52px; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 500;
  }

  .overlay-ascii {
    color: var(--orange);
    font-size: 11px;
    opacity: 0.45;
    letter-spacing: 2px;
    white-space: pre;
    line-height: 1.5;
  }

  .overlay-msg {
    color: var(--dim);
    font-size: 12px;
    letter-spacing: 2px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  .blink { animation: blink 1s step-end infinite; }
</style>
</head>
<body>

<!-- ── Frozen top navigation bar ─────────────────────── -->
<div id="topbar">
  <div class="logo">▸ AI INTEL</div>
  <div class="bar-divider"></div>
  <div class="status-dot"></div>
  <div id="regimeBadge">---</div>

  <div class="flex-space"></div>

  <div class="select-wrap">
    <select id="dateSelect" onchange="onSelectChange()">
      <option>載入中...</option>
    </select>
    <span class="select-arrow">▾</span>
  </div>

  <button id="loadBtn" onclick="loadReport()">▶ OPEN REPORT</button>

  <div class="bar-divider"></div>
  <div id="clock">--:--:--</div>
</div>

<!-- ── Loading overlay ───────────────────────────────── -->
<div id="overlay">
  <pre class="overlay-ascii">╔══════════════════════════════════╗
║  AI MARKET INTELLIGENCE SYSTEM  ║
╚══════════════════════════════════╝</pre>
  <div class="overlay-msg"><span class="blink">■</span> &nbsp;LOADING LATEST REPORT...</div>
</div>

<!-- ── Report rendered inline ────────────────────────── -->
<iframe id="reportFrame" src="about:blank"></iframe>

<script>
  // ── Clock ──────────────────────────────────────────────
  (function tickClock() {
    const p = n => String(n).padStart(2, '0');
    const el = document.getElementById('clock');
    function update() {
      const n = new Date();
      el.textContent = `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
    }
    update();
    setInterval(update, 1000);
  })();

  // ── Regime colour ──────────────────────────────────────
  function applyRegime(regime) {
    const el = document.getElementById('regimeBadge');
    el.textContent = regime || '---';
    const r = (regime || '').toLowerCase();
    if (r.includes('risk-on') || r.includes('risk on'))
      el.style.color = 'var(--green)';
    else if (r.includes('risk-off') || r.includes('risk off'))
      el.style.color = 'var(--red)';
    else
      el.style.color = 'var(--yellow)';
  }

  // ── State ──────────────────────────────────────────────
  let manifest = null;

  // ── Boot: load manifest → populate select → load latest ─
  async function init() {
    try {
      const res = await fetch('manifest.json?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      manifest = await res.json();

      const dates = manifest.dates || [];
      const sel = document.getElementById('dateSelect');
      sel.innerHTML = '';

      dates.forEach(entry => {
        const opt = document.createElement('option');
        opt.value = entry.date;
        opt.textContent = `${entry.display}  [${entry.regime}]`;
        sel.appendChild(opt);
      });

      // Pre-select latest
      if (manifest.latest) sel.value = manifest.latest;

      // Show regime for latest
      const latest = dates.find(d => d.date === manifest.latest) || dates[0];
      if (latest) applyRegime(latest.regime);

      // Auto-load latest report
      loadReport();

    } catch (e) {
      console.error(e);
      document.getElementById('overlay').innerHTML = `
        <div style="color:var(--red);font-size:12px;letter-spacing:2px;text-align:center;line-height:2.2;">
          ✕ 無法載入 manifest.json<br>
          <span style="color:var(--dim);font-size:10px;">
            請確認 docs/manifest.json 存在且格式正確
          </span>
        </div>`;
    }
  }

  // ── Dropdown change: update regime badge only ──────────
  function onSelectChange() {
    if (!manifest) return;
    const date = document.getElementById('dateSelect').value;
    const entry = manifest.dates.find(d => d.date === date);
    if (entry) applyRegime(entry.regime);
  }

  // ── Load report into iframe ─────────────────────────────
  function loadReport() {
    const date = document.getElementById('dateSelect').value;
    if (!date || date === '載入中...') return;

    const frame = document.getElementById('reportFrame');
    const overlay = document.getElementById('overlay');

    overlay.style.display = 'flex';
    frame.style.opacity = '0';

    frame.onload = () => {
      // Only hide overlay once a real page loaded (not blank)
      if (frame.src && frame.src !== 'about:blank') {
        overlay.style.display = 'none';
        frame.style.opacity = '1';
      }
    };

    frame.src = date + '_claude.html';
  }

  init();
</script>
</body>
</html>
