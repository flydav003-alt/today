name: Auto Update Manifest

on:
  push:
    branches:
      - main
    paths:
      - 'docs/[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]_claude.html'

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run manifest updater
        run: python auto_update_manifest.py
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}

      - name: Commit updated manifest
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/manifest.json
          # 只有在 manifest.json 有變動時才 commit
          if git diff --staged --quiet; then
            echo "No changes to manifest.json, skipping commit."
          else
            git commit -m "chore: auto-update manifest.json [skip ci]"
            git push
          fi
